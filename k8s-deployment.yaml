apiVersion: apps/v1
kind: Deployment # Kubernetes resource kind we are creating

metadata:
  name: spring-boot-k8s

spec:

  selector:
    matchLabels:
      app: spring-boot-k8s

  replicas: 3 # create 3 replicas/pods for this deployment

  template:
    metadata:
      labels:
        app: spring-boot-k8s

    spec:
      containers:
        - name: spring-boot-k8s
          image: springboot-k8s-example:1.0
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080